spring.application.name=coopa

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:coopa}

jwt.secret=${JWT_SECRET:coopa-secret-key-minimo-512-bits-para-hs512-algoritmo-seguro-use-openssl-rand-base64-64}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/api/swagger-ui.html
springdoc.swagger-ui.enabled=true
