version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: coopa-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: coopa
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: coopa-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017
      SPRING_DATA_MONGODB_DATABASE: coopa
      JWT_SECRET: ${JWT_SECRET:-coopa-secret-key-minimo-512-bits-para-hs512-algoritmo-seguro-troca-isso}
      JWT_EXPIRATION: 86400000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:80,http://frontend
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: coopa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
